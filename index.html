<!DOCTYPE html>
<html>
<head>
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px;">
    <h3>የመሳሪያ እና የኔትወርክ ማረጋገጫ</h3>
    <p id="status">እባክዎ ይጠብቁ...</p>

    <script>
        async function verify() {
            try {
                // 1. IP አድራሻን ከኤፒአይ ማግኘት
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                const ip = data.ip;

                // 2. ቀላል Device ID (userAgent + screen size)
                const deviceID = navigator.userAgent + screen.width + "x" + screen.height;
                const finalData = "IP:" + ip + " | ID:" + btoa(deviceID);

                // 3. መረጃውን ወደ ቦት መላክ
                document.getElementById('status').innerText = "የተረጋገጠ IP: " + ip;
                Telegram.WebApp.sendData(finalData);
                
                // ለተወሰነ ሰከንድ በኋላ WebApp-ውን መዝጋት
                setTimeout(() => { Telegram.WebApp.close(); }, 2000);
                
            } catch (e) {
                document.getElementById('status').innerText = "ስህተት ተፈጥሯል: " + e.message;
            }
        }

        verify();
    </script>
</body>
</html>
