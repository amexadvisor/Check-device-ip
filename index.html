<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP & Device Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background-color: #1c1c1e; color: white; font-family: sans-serif;
        }
        #top-bar {
            padding: 10px; text-align: center; background: #2c2c2e;
            border-bottom: 2px solid #34c759; font-size: 14px;
        }
        iframe {
            width: 100%; height: calc(100% - 45px); border: none;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <span id="status">🔄 የኢንተርኔት አድራሻዎ (IP) እየተፈተሸ ነው...</span>
    </div>

    <iframe src="https://ipapi.co/"></iframe>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // ዌብ አፑን ሙሉ ስክሪን ማድረግ

        function generateDeviceId() {
            let info = window.navigator.userAgent + window.screen.width + window.screen.height;
            let hash = 0;
            for (let i = 0; i < info.length; i++) {
                hash = ((hash << 5) - hash) + info.charCodeAt(i);
                hash = hash & hash;
            }
            return Math.abs(hash).toString().substring(0, 6);
        }

        let deviceId = generateDeviceId();

        // በጀርባ ፍተሻውን ማካሄድ
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            const orgName = (data.org || "").toLowerCase();
            const isVPN = orgName.includes("vpn") || orgName.includes("proxy") || orgName.includes("hosting");

            if (isVPN) {
                document.getElementById("status").innerHTML = "❌ ቪፒኤን (VPN) ተገኝቷል! መዳረሻ ተከልክሏል።";
                document.getElementById("top-bar").style.borderBottom = "2px solid #ff3b30";
                tg.sendData("BANNED_VPN"); // ለቦቱ መላክ
                setTimeout(() => { tg.close(); }, 2000);
            } else {
                document.getElementById("status").innerHTML = "✅ የደህንነት ፍተሻው በተሳካ ሁኔታ ተጠናቋል!";
                tg.sendData("CHECK_DEVICE:" + deviceId); // ለቦቱ መላክ
                setTimeout(() => { tg.close(); }, 1500);
            }
        })
        .catch(err => {
            // ኔትወርክ ቢጠፋ እንኳ በስልክ መለያ ማሳለፍ
            document.getElementById("status").innerHTML = "✅ ተጠናቋል!";
            tg.sendData("CHECK_DEVICE:" + deviceId);
            setTimeout(() => { tg.close(); }, 1500);
        });
    </script>
</body>
</html>
