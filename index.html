<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Security</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1c1c1e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { margin-top: 50px; padding: 25px; background: #2c2c2e; border-radius: 15px; }
        .box { font-size: 20px; margin: 15px 0; padding: 15px; background: #1c1c1e; border-radius: 8px; }
        .btn { background-color: #30d158; color: white; border: none; padding: 15px 30px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status" style="font-size: 20px; font-weight: bold;">🔍 ደህንነት በማረጋገጥ ላይ...</div>
        <div class="box" id="ip-display">IP: በመፈለግ ላይ...</div>
        <button id="btn" class="btn" onclick="finish()" style="display:none;">✅ አረጋግጥ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let finalStatus = "SAFE";

        // 1. IP ከ ipify መጎተት
        fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
            const userIP = data.ip;
            document.getElementById("ip-display").innerText = "IP: " + userIP;
            
            // 2. የስልኩ Timezone ፍተሻ (-180 ማለት ኢትዮጵያ ነው)
            const offset = new Date().getTimezoneOffset();
            
            if (offset !== -180) {
                document.getElementById("status").innerText = "❌ VPN/Proxy ተገኝቷል!";
                document.getElementById("status").style.color = "#ff453a";
                finalStatus = "BANNED_VPN";
            } else {
                document.getElementById("status").innerText = "✅ ኔትወርክዎ አስተማማኝ ነው";
                document.getElementById("status").style.color = "#30d158";
                finalStatus = "SAFE_DEVICE";
            }
            document.getElementById("btn").style.display = "block";
        })
        .catch(() => {
            document.getElementById("ip-display").innerText = "IP: ያልተገኘ";
            document.getElementById("btn").style.display = "block";
        });

        function finish() {
            tg.sendData(finalStatus);
            tg.close();
        }
    </script>
</body>
</html>
