<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); // ቴሌግራም አፕ መሆኑን ያረጋግጣል
    
    function sendInfo() {
        if (window.Telegram.WebApp.initDataUnsafe) {
            tg.sendData("TEST_SUCCESS"); // መረጃውን ይልካል
        } else {
            alert("ይህ በቴሌግራም ውስጥ ብቻ ነው የሚሰራው!");
        }
    }
</script>
<button onclick="sendInfo()">CHECK</button>
