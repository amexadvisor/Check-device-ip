<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="status">ማረጋገጫ በሂደት ላይ...</div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function verify() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                
                const deviceID = Math.abs(window.navigator.userAgent.length + window.screen.width + window.screen.height).toString();
                const finalData = data.ip + ":" + deviceID;

                tg.sendData(finalData);
                document.getElementById('status').innerText = "ተልኳል!";
            } catch (e) {
                tg.sendData("ERROR:Failed");
            }
        }
        verify();
    </script>
</body>
</html>
