<!DOCTYPE html>
<html>
<body>
    <script>
        // 1. ቀላል እና አስተማማኝ የIP እና Device መለኪያ
        async function getDeviceData() {
            // የIP መረጃን ለማግኘት ነፃ ኤፒአይ
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            
            // የሃርድዌር መረጃ (ቀላል)
            const deviceID = btoa(navigator.userAgent + screen.width + screen.height);
            
            const fullID = data.ip + "---" + deviceID;
            
            // ቦትሽ ጋር መረጃውን መላክ
            console.log("Unique ID:", fullID);
            Telegram.WebApp.sendData(fullID);
        }

        getDeviceData();
    </script>
</body>
</html>
