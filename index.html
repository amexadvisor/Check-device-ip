<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Device Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { margin-top: 50px; padding: 25px; background: #1a1a1a; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">የመሳሪያ መታወቂያ በመፍጠር ላይ...</div>
        <button id="btn" onclick="sendData()" style="display:none; padding:15px; margin-top:20px;">✅ ማረጋገጫ ላክ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // መሳሪያውን ለመለየት የማይለዋወጡ መረጃዎችን ማሰባሰብ
        function getDeviceFingerprint() {
            const components = [
                navigator.userAgent,           // የብሮውዘር አይነት
                navigator.language,            // ቋንቋ
                screen.width + "x" + screen.height, // የስክሪን መጠን
                screen.colorDepth,             // የቀለም ጥልቀት
                navigator.hardwareConcurrency, // የሲፒዩ ኮር ብዛት
                Intl.DateTimeFormat().resolvedOptions().timeZone // የጊዜ ቀጠና
            ];
            
            const fingerprint = components.join('|');
            
            // የባህሪ መረጃውን ወደ Unique ID (Hash) መቀየር
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
                hash = hash & hash;
            }
            return "DEV_" + Math.abs(hash).toString(16);
        }

        const deviceId = getDeviceFingerprint();

        document.getElementById("status").innerText = "መታወቂያ ተገኝቷል: " + deviceId;
        document.getElementById("btn").style.display = "block";

        function sendData() {
            // ይህንን ID ለቦቱ ትልኪዋለሽ
            tg.sendData("DEVICE_ID:" + deviceId);
            tg.close();
        }
    </script>
</body>
</html>
